# /etc/nginx/sites-available/mcp.finanz-copilot.de
# certbot --nginx -d mcp.finanz-copilot.de adds the TLS server block + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name mcp.finanz-copilot.de;

    # MCP endpoint (streamable HTTP). App itself answers 405 for non-POST.
    location = /mcp {
        proxy_pass http://127.0.0.1:8814;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;          # required for SSE-style streaming responses
        proxy_read_timeout 300s;
        client_max_body_size 2m;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8814;
    }

    # nothing else is exposed
    location / {
        return 404;
    }
}
